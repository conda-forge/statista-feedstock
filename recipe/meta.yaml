{% set python_min = "3.11" %}
{% set name = "statista" %}
{% set version = "0.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Serapieum-of-alex/statista/archive/{{ version }}.tar.gz
  sha256: 674542d4a6247751e21c97d395c8e90ed295a4496101b8a98f2f74f9ff84e5d2

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip >=25.2
    - hatchling
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - matplotlib >=3.9.0
    - pandas >=2.1.0
    - scipy >=1.14.0
    - scikit-learn >=1.5.1
    - loguru >=0.7.2

test:
  requires:
    - python {{ python_min }}
  imports:
    - statista

about:
  home: https://github.com/Serapieum-of-alex/statista
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: Statistical Package
  description: |
    Statistical Package.
  dev_url: https://github.com/Serapieum-of-alex/statista
  doc_url: https://serapieum-of-alex.github.io/statista/
  doc_source_url: https://github.com/Serapieum-of-alex/statista/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
